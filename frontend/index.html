<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="device">

        <div class="header">
        <span class="brand">Unit Converter</span>
        <div class="status-dot"></div>
        </div>

        <div class="tabs">
        <div class="tab active" data-cat="temperatura">Temp</div>
        <div class="tab" data-cat="longitud">Long</div>
        <div class="tab" data-cat="peso">Peso</div>
        <div class="tab" data-cat="velocidad">Vel</div>
        </div>

        <div class="screen">
        <div class="screen-label">Resultado</div>
        <div class="screen-value placeholder" id="result">—</div>
        <div class="screen-unit" id="result-unit"></div>
        </div>

        <div class="input-row">
        <div class="field">
            <label>Valor</label>
            <input type="number" id="valor" placeholder="0.00" step="any">
        </div>
        <button class="swap-btn" id="swap-btn">⇄</button>
        <div class="field">
            <label>De</label>
            <select id="desde"></select>
        </div>
        </div>

        <div class="input-row single">
        <div class="field">
            <label>Hacia</label>
            <select id="hasta"></select>
        </div>
        </div>

        <button class="convert-btn" id="convert-btn">Convertir</button>

        <div class="history">
        <div class="history-title">Recientes</div>
        <div class="history-list" id="history-list">
            <div class="empty-history">Sin conversiones aun</div>
        </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
