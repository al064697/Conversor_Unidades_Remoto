<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Unidades</title>
    <script>
        (function () {
            const saved = localStorage.getItem('themeMode') || 'auto';
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const resolved = saved === 'auto' ? (prefersDark ? 'dark' : 'light') : saved;
            document.documentElement.setAttribute('data-theme', resolved);
        })();
    </script>
    <link rel="icon" type="image/svg+xml" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/calculator.svg">
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="device">

        <div class="header">
        <span class="brand">Unit Converter</span>
        <div class="header-actions">
            <div class="theme-control">
                <i class="bi bi-circle-half"></i>
                <select id="theme-mode" aria-label="Modo de tema">
                    <option value="auto">Auto</option>
                    <option value="dark">Dark</option>
                    <option value="light">Light</option>
                </select>
            </div>
            <div class="status-dot"></div>
        </div>
        </div>

        <div class="tabs">
        <div class="tab active" data-cat="temperatura"><i class="bi bi-thermometer-half"></i><span>Temp</span></div>
        <div class="tab" data-cat="longitud"><i class="bi bi-rulers"></i><span>Long</span></div>
        <div class="tab" data-cat="peso"><i class="bi bi-box-seam"></i><span>Peso</span></div>
        <div class="tab" data-cat="velocidad"><i class="bi bi-speedometer2"></i><span>Vel</span></div>
        </div>

        <div class="screen">
        <div class="screen-label">Resultado</div>
        <div class="screen-value placeholder" id="result">—</div>
        <div class="screen-unit" id="result-unit"></div>
        </div>

        <div class="input-row">
        <div class="field">
            <label>Valor</label>
            <input type="number" id="valor" placeholder="0.00" step="any">
        </div>
        <button class="swap-btn" id="swap-btn" aria-label="Intercambiar unidades"><i class="bi bi-arrow-left-right"></i></button>
        <div class="field">
            <label>De</label>
            <select id="desde"></select>
        </div>
        </div>

        <div class="input-row single">
        <div class="field">
            <label>Hacia</label>
            <select id="hasta"></select>
        </div>
        </div>

        <button class="convert-btn" id="convert-btn"><i class="bi bi-arrow-repeat"></i><span>Convertir</span></button>

        <div class="history">
        <div class="history-title"><i class="bi bi-clock-history"></i><span>Recientes</span></div>
        <div class="history-list" id="history-list">
            <div class="empty-history">Sin conversiones aun</div>
        </div>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
